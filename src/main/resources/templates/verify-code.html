<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Verificar código</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-3">Verificar código</h3>
        <p class="text-center text-muted">Ingresa el código enviado a tu correo</p>

        <div th:if="${error}" class="alert alert-danger text-center p-2">
            <p th:text="${error}" class="m-0"></p>
        </div>

        <form th:action="@{/recover/verify}" method="post">
            <div class="mb-3">
                <label class="form-label">Código de 6 dígitos:</label>
                <input type="text" name="code" maxlength="6" class="form-control" required />
            </div>

            <button type="submit" class="btn btn-primary w-100">Verificar</button>
        </form>
    </div>

</body>

</html>
