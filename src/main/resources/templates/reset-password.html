<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Restablecer contraseña</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-3">Restablecer contraseña</h3>

        <div th:if="${error}" class="alert alert-danger text-center p-2">
            <p th:text="${error}" class="m-0"></p>
        </div>

        <form th:action="@{/recover/save}" method="post">
            <!-- Código oculto -->
            <input type="hidden" name="code" th:value="${code}" />

            <div class="mb-3">
                <label for="password" class="form-label">Nueva contraseña:</label>
                <input type="password" id="password" name="password"
                       class="form-control" required />
            </div>

            <div class="mb-3">
                <label for="password2" class="form-label">Confirmar contraseña:</label>
                <input type="password" id="password2" class="form-control"
                       required oninput="validar();" />
            </div>

            <button type="submit" id="btn" class="btn btn-primary w-100">Guardar contraseña</button>
        </form>
    </div>

    <script>
        function validar() {
            const p1 = document.getElementById("password").value;
            const p2 = document.getElementById("password2").value;
            document.getElementById("btn").disabled = p1 !== p2;
        }
    </script>

</body>

</html>
