<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Admin Eventos Aranda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { border-radius: 12px; }
        .table thead { background: #212529; color: #fff; }
    </style>
</head>
<body>
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Usuarios Registrados</h2>
        <!-- Botón abrir modal crear -->
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#usuarioModal" onclick="abrirCrearUsuario()">+ Nuevo Usuario</button>
    </div>

    <div class="card p-3 mb-4">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u,iterStat : ${usuarios}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol}"></td>
                <td>
<button type="button" class="btn btn-sm btn-outline-secondary"
            th:attr="data-id=${u.id}, 
                     data-nombre=${u.nombre}, 
                     data-email=${u.email}, 
                     data-contraseña=${u.contraseña}, 
                     data-rol=${u.rol}"
            onclick="abrirEditarUsuario(this)">
        Editar
    </button>
                    
    <a th:href="@{'/admin/usuarios/eliminar/' + ${u.id}}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar usuario?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Crear/Editar Usuario -->
<div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="usuarioModalLabel">Nuevo Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="text" th:field="*{contraseña}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Rol</label>
                    <select th:field="*{rol}" class="form-select">
                        <option value="CLIENTE">CLIENTE</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
     function abrirCrearUsuario() {
        const form = document.querySelector('#usuarioModal form');
        document.getElementById('usuarioModalLabel').innerText = 'Nuevo Usuario';
        form.action = '/admin/usuarios/guardar';

  
        form.querySelector('[name="id"]').value = '';
        form.querySelector('[name="nombre"]').value = '';
        form.querySelector('[name="email"]').value = '';
        form.querySelector('[name="contraseña"]').value = '';
        form.querySelector('[name="rol"]').value = 'CLIENTE';

        const modal = new bootstrap.Modal(document.getElementById('usuarioModal'));
        modal.show();
    }

    function abrirEditarUsuario(btn) {
        const form = document.querySelector('#usuarioModal form');
        document.getElementById('usuarioModalLabel').innerText = 'Editar Usuario';
        form.action = '/admin/usuarios/actualizar';

        form.querySelector('[name="id"]').value = btn.dataset.id;
        form.querySelector('[name="nombre"]').value = btn.dataset.nombre;
        form.querySelector('[name="email"]').value = btn.dataset.email;
        form.querySelector('[name="contraseña"]').value = btn.dataset.contraseña;
        form.querySelector('[name="rol"]').value = btn.dataset.rol;

        const modal = new bootstrap.Modal(document.getElementById('usuarioModal'));
        modal.show();
    }
</script>
</body>
</html>
