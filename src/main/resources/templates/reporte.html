<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">📊 Reporte de Eventos Reservados</h2>

    <div class="row">
        <!-- Gráfico de barras -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5 class="text-center">Ventas realizadas por Mes</h5>
                <canvas id="graficoBarras" width="400" height="200"></canvas>
            </div>
        </div>

        <!-- Tabla de datos barras -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>Datos Mensuales</h5>
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Mes</th>
                        <th>Reservas</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="et, iterStat : ${etiquetas}">
                        <td th:text="${et}"></td>
                        <td th:text="${valores[iterStat.index]}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <!-- Gráfico de pastel -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5 class="text-center">Reservas por Tipo</h5>
                <canvas id="graficoPastel" width="400" height="300"></canvas>
            </div>
        </div>

        <!-- Tabla de datos pastel -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5>Datos por Tipo</h5>
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Tipo de Evento</th>
                        <th>Cantidad</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tp, iterStat : ${tipos}">
                        <td th:text="${tp}"></td>
                        <td th:text="${cantidades[iterStat.index]}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const etiquetas = /*[[${etiquetas}]]*/ [];
    const valores = /*[[${valores}]]*/ [];
    const tipos = /*[[${tipos}]]*/ [];
    const cantidades = /*[[${cantidades}]]*/ [];

    // Gráfico de Barras
    const ctxBarras = document.getElementById('graficoBarras').getContext('2d');
    new Chart(ctxBarras, {
        type: 'bar',
        data: {
            labels: etiquetas,
            datasets: [{
                label: 'Reservas',
                data: valores,
                backgroundColor: 'rgba(75, 192, 192, 0.6)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Gráfico de Pastel
    const ctxPastel = document.getElementById('graficoPastel').getContext('2d');
    new Chart(ctxPastel, {
        type: 'pie',
        data: {
            labels: tipos,
            datasets: [{
                data: cantidades,
                backgroundColor: ['#36A2EB', '#FF6384', '#FFCE56']
            }]
        },
        options: { responsive: true }
    });
    /*]]>*/
</script>

</body>
</html>
