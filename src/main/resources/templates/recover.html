<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Recuperar contraseña</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-3">Recuperar contraseña</h3>

        <div th:if="${message}" class="alert alert-success text-center p-2">
            <p th:text="${message}" class="m-0"></p>
        </div>

        <form th:action="@{/recover}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico:</label>
                <input type="email" id="email" name="email" class="form-control"
                       required placeholder="tu@correo.com">
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar código</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none">Volver al login</a>
        </div>
    </div>

</body>

</html>
