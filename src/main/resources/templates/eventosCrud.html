<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eventos - Admin Eventos Aranda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card { border-radius: 12px; }
        .table thead { background: #212529; color: #fff; }
        img.thumb {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
<div class="container-fluid p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Eventos Registrados</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventoModal"
                onclick="abrirCrearEvento()">+ Nuevo Evento</button>
    </div>

    <div class="card p-3 mb-4">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Descripción</th>
                <th>Tipo</th>
                <th>Imagen</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="e, iter : ${eventos}">
                <td th:text="${iter.count}"></td>
                <td th:text="${e.descripcion}"></td>
                <td th:text="${e.tipo}"></td>

                <!-- Miniatura -->
                <td>
                    <img th:src="@{/img/{r}(r=${e.ruta_imagen})}" class="thumb" alt="img">
                </td>

                <td>S/ <span th:text="${e.precio}"></span></td>

                <td>
                    <!-- Botón Editar -->
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            th:attr="data-id=${e.id},
                                     data-descripcion=${e.descripcion},
                                     data-tipo=${e.tipo},
                                     data-ruta=${e.ruta_imagen},
                                     data-precio=${e.precio}"
                            onclick="abrirEditarEvento(this)">
                        Editar
                    </button>

                    <!-- Botón Eliminar -->
                    <a th:href="@{'/admin/eventos/eliminar/' + ${e.id}}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Eliminar evento?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>


<!-- MODAL CREAR / EDITAR -->
<div class="modal fade" id="eventoModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/admin/eventos/guardar}"
              th:object="${evento}"
              method="post"
              enctype="multipart/form-data"
              class="modal-content">


            <div class="modal-header">
                <h5 class="modal-title" id="eventoModalLabel">Nuevo Evento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{ruta_imagen}">

                <div class="mb-3">
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Tipo</label>
                    <input type="text" th:field="*{tipo}" class="form-control" required>
                </div>

                <!-- Selector de archivo -->
                <div class="mb-3">
                    <label>Imagen del Evento</label>
                    <input type="file" name="archivoImagen" class="form-control" accept="image/*">
                </div>

                <!-- Muestra actual si está editando -->
                <div class="mb-3" th:if="${evento.ruta_imagen}">
                    <label>Imagen Actual:</label><br>
                    <img th:src="@{/img/{r}(r=${evento.ruta_imagen})}" class="img-thumbnail" width="150">
                </div>

                <div class="mb-3">
                    <label>Precio (S/)</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>

        </form>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function abrirCrearEvento() {
    const form = document.querySelector('#eventoModal form');
    document.getElementById('eventoModalLabel').innerText = 'Nuevo Evento';
    form.action = '/admin/eventos/guardar';

    form.querySelector('[name="id"]').value = '';
    form.querySelector('[name="descripcion"]').value = '';
    form.querySelector('[name="tipo"]').value = '';
    form.querySelector('[name="ruta_imagen"]').value = '';  
    form.querySelector('[name="precio"]').value = '';

    new bootstrap.Modal(document.getElementById('eventoModal')).show();
}

function abrirEditarEvento(btn) {
    const form = document.querySelector('#eventoModal form');
    document.getElementById('eventoModalLabel').innerText = 'Editar Evento';
    form.action = '/admin/eventos/guardar';

    form.querySelector('[name="id"]').value = btn.dataset.id;
    form.querySelector('[name="descripcion"]').value = btn.dataset.descripcion;
    form.querySelector('[name="tipo"]').value = btn.dataset.tipo;
    form.querySelector('[name="ruta_imagen"]').value = btn.dataset.ruta; 
    form.querySelector('[name="precio"]').value = btn.dataset.precio;

    new bootstrap.Modal(document.getElementById('eventoModal')).show();
}

</script>

</body>
</html>
