<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reserva Confirmada</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
                background-color: #ffffff !important; 
            }
            .text-center a.btn, 
            .text-center button.btn {
                display: none !important;
            }
            hr.my-4 {
                display: none !important;
            }
            .card.shadow-lg {
                box-shadow: none !important;
                padding: 0 !important;
                border: none !important;
                background-color: #ffffff !important;
            }
            .container.mt-5 {
                margin-top: 0 !important;
                padding-top: 0 !important;
                width: 100%;
                max-width: none;
            }
            .p-3.bg-light.border.rounded {
                 background-color: #ffffff !important;
                 border: 1px solid #ccc !important; 
            }
        }
    </style>
    
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h2 class="text-center text-success fw-bold mb-4">¡Reserva Confirmada!</h2>

        <div class="row">
            <!-- IMAGEN -->
            <div class="col-md-4">
<img th:src="@{/{x}(x=${evento.ruta_imagen})}"
     class="img-fluid rounded border" alt="Evento">


            </div>

            <div class="col-md-8">

                <!-- EVENTO -->
                <h3 class="fw-bold" th:text="${evento.descripcion}"></h3>

                <!-- CLIENTE -->
                <p class="mt-3">
                    <strong>Cliente:</strong>
                    <span th:text="${cliente}"></span>
                </p>

                <!-- FECHA -->
                <p>
                    <strong>Fecha reservada:</strong>
                    <span th:text="${fecha}"></span>
                </p>

                <!-- HORA -->
                <p>
                    <strong>Hora reservada:</strong>
                    <span th:text="${hora}"></span>
                </p>

                <!-- TELÉFONO -->
                <p>
                    <strong>Teléfono:</strong>
                    <span th:text="${telefono}"></span>
                </p>

                <!-- MÉTODO DE PAGO -->
                <p>
                    <strong>Método de pago:</strong>
                    <span th:text="${metodo}"></span>
                </p>

                <!-- OBSERVACIONES -->
                <p>
                    <strong>Observaciones:</strong>
                </p>

                <div class="p-3 bg-light border rounded" th:text="${reserva.observaciones}">
                    <!-- Si está vacío, igual muestra cuadro -->
                </div>

                <!-- PRECIO -->
                <p class="mt-4 fs-5 fw-bold">
                    Total pagado: S/
                    <span th:text="${precio}"></span>
                </p>

                <!-- ESTADO -->
                <p>
                    <strong>Estado:</strong>
                    <span class="badge bg-success fs-6" th:text="${estado}"></span>
                </p>

            </div>
        </div>

        <hr class="my-4">

        <div class="text-center">
            <a href="/" class="btn btn-primary px-4">Volver al inicio</a>
            <button class="btn btn-outline-secondary px-4" onclick="imprimirConfirmacion()"> Imprimir Boleto</button>
        </div>

    </div>
</div>

<script>
  function imprimirConfirmacion() {
    window.print();
  }
</script>

</body>
</html>
