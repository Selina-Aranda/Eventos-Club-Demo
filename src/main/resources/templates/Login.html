<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Eventos Aranda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark py-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img th:src="@{/img/logo/LOGO.png}" alt="Logo" width="100" height="100" class="d-inline-block align-text-top">
        </a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#nosotros">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/servicios}">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/reserva}">Reservas</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/cotizar}">Cotizar</a></li>
        </ul>
      </div>
      <a class="navbar-brand" th:href="@{/login}">
        <img th:src="@{/img/logo/person-circle.svg}" alt="Logo" width="50" height="50" class="d-inline-block align-text-top">
      </a>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; padding-top: 120px;">
    <div class="card shadow-lg p-4" style="width: 26rem;">
      <h4 id="titulo-form" class="text-center mb-3">Iniciar Sesión</h4>

      <form id="form-login" th:action="@{/Login}" method="post">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" placeholder="Ej: admin" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" name="contraseña" placeholder="********" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Ingresar</button>

    <!-- mensaje de error -->
    <p th:if="${error}" class="text-danger mt-2" th:text="${error}"></p>
</form>


      <!-- FORMULARIO REGISTRO (opcional) -->
      <form id="form-registro" th:action="@{/registro}" method="post" style="display:none;">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" name="contraseña" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Registrarse</button>
      </form>

      <hr class="my-4">

      <p class="text-center text-muted">
        <span id="toggle-login">¿No tienes cuenta? 
          <a href="#" id="mostrar-registro" class="text-decoration-none">Regístrate</a> <br>
          <a th:href="@{/recover}">¿Olvidaste tu contraseña?</a>
        </span>
        <span id="toggle-registro" style="display:none;">¿Ya tienes cuenta? 
          <a href="#" id="mostrar-login" class="text-decoration-none">Inicia sesión</a>
        </span>
      </p>
    </div>
  </div>

  <footer class="bg-dark text-white text-center text-lg-start mt-5">
    <div class="text-center p-3 bg-secondary">
      © 2025 Eventos Aranda - Todos los derechos reservados
    </div>
  </footer>

  <script>
    const formLogin = document.getElementById("form-login");
    const formRegistro = document.getElementById("form-registro");
    const titulo = document.getElementById("titulo-form");
    const toggleLogin = document.getElementById("toggle-login");
    const toggleRegistro = document.getElementById("toggle-registro");

    document.getElementById("mostrar-registro").addEventListener("click", () => {
      formLogin.style.display = "none";
      formRegistro.style.display = "block";
      titulo.textContent = "Crear cuenta";
      toggleLogin.style.display = "none";
      toggleRegistro.style.display = "inline";
    });

    document.getElementById("mostrar-login").addEventListener("click", () => {
      formRegistro.style.display = "none";
      formLogin.style.display = "block";
      titulo.textContent = "Iniciar sesión";
      toggleLogin.style.display = "inline";
      toggleRegistro.style.display = "none";
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
